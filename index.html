<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BeatDrop - 节奏音游</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #151520;
  --text: #e0e0f0;
  --lane1: #ff5e7a;
  --lane2: #5ec4ff;
  --lane3: #5eff9e;
  --lane4: #ffbe5e;
  --hit-glow: #ffffff;
  --perfect: #ffdd57;
  --great: #5ec4ff;
  --good: #5eff9e;
  --miss: #ff5e7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex; justify-content: center; align-items: center;
  height: 100dvh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100%; max-width: 520px; height: 100dvh;
  display: flex; flex-direction: column;
  position: relative;
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px; padding: 24px;
}
#title-screen h1 {
  font-size: 48px; font-weight: 900;
  background: linear-gradient(135deg, var(--lane1), var(--lane2), var(--lane3), var(--lane4));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
}
.subtitle { color: #888; font-size: 14px; letter-spacing: 8px; }

.track-list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 380px; }
.track-card {
  background: var(--surface); border: 2px solid #222;
  border-radius: 14px; padding: 16px 20px;
  cursor: pointer; transition: all 0.2s;
  display: flex; justify-content: space-between; align-items: center;
}
.track-card:hover, .track-card.selected {
  border-color: var(--lane2);
  box-shadow: 0 0 20px rgba(94,196,255,0.15);
}
.track-card.selected { border-color: #fff; box-shadow: 0 0 24px rgba(255,255,255,0.2); }
.track-name { font-size: 18px; font-weight: 700; }
.track-meta { color: #777; font-size: 13px; }
.track-diff {
  font-size: 12px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; letter-spacing: 1px;
}
.diff-easy { background: #5eff9e22; color: var(--good); }
.diff-normal { background: #5ec4ff22; color: var(--great); }
.diff-hard { background: #ff5e7a22; color: var(--miss); }

.key-guide {
  display: flex; gap: 20px; margin-top: 8px;
}
.key {
  width: 48px; height: 48px; border-radius: 10px;
  border: 2px solid #333; display: flex;
  align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px;
  color: #666; background: #111;
}
.key:nth-child(1) { border-color: var(--lane1); color: var(--lane1); }
.key:nth-child(2) { border-color: var(--lane2); color: var(--lane2); }
.key:nth-child(3) { border-color: var(--lane3); color: var(--lane3); }
.key:nth-child(4) { border-color: var(--lane4); color: var(--lane4); }

#start-btn {
  background: #fff; color: #000; border: none;
  padding: 14px 60px; border-radius: 30px;
  font-size: 18px; font-weight: 700; cursor: pointer;
  letter-spacing: 2px; transition: all 0.2s;
}
#start-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(255,255,255,0.3); }
#start-btn:active { transform: scale(0.96); }

/* ===== GAME SCREEN ===== */
#game-screen { flex: 1; display: none; flex-direction: column; position: relative; }

/* HUD */
#hud {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 16px; z-index: 10;
}
#score-display { font-size: 28px; font-weight: 900; letter-spacing: 1px; }
#combo-display {
  font-size: 20px; font-weight: 700;
  transition: all 0.1s;
}
#combo-display.breaking { color: var(--miss); animation: shake 0.3s; }
#accuracy-display { font-size: 14px; color: #888; }

#health-bar-bg {
  height: 4px; background: #222; margin: 0 16px;
  border-radius: 2px; overflow: hidden;
}
#health-bar {
  height: 100%; background: linear-gradient(90deg, var(--miss), var(--good), var(--great));
  border-radius: 2px; transition: width 0.3s;
}

/* Canvas */
#game-canvas-wrap {
  flex: 1; position: relative; margin: 0 8px 8px;
}
#game-canvas {
  width: 100%; height: 100%; display: block;
  border-radius: 12px; background: #0d0d18;
}

/* Hit zone indicator */
.judgment-flash {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  font-size: 40px; font-weight: 900;
  pointer-events: none; z-index: 20;
  animation: judgmentPop 0.5s forwards;
  letter-spacing: 2px;
}
@keyframes judgmentPop {
  0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8) translateY(-40px); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Touch zones (mobile) */
#touch-zones {
  display: none; position: absolute; bottom: 0; left: 8px; right: 8px;
  height: 80px; z-index: 15;
}
#touch-zones .tz {
  flex: 1; height: 100%;
}
@media (max-width: 600px) {
  #touch-zones { display: flex; }
}

/* Pause overlay */
#pause-overlay {
  display: none; position: absolute; inset: 0; z-index: 30;
  background: rgba(0,0,0,0.8); flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  border-radius: 12px;
}
#pause-overlay h2 { font-size: 32px; letter-spacing: 4px; }

/* ===== RESULT SCREEN ===== */
#result-screen {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 24px;
}
#result-grade {
  font-size: 80px; font-weight: 900;
  background: linear-gradient(135deg, var(--lane4), var(--lane2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
#result-score { font-size: 32px; font-weight: 700; }
.result-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px 24px; font-size: 15px;
}
.result-stats span:nth-child(even) { text-align: right; font-weight: 700; }
.result-stats .c-perfect { color: var(--perfect); }
.result-stats .c-great { color: var(--great); }
.result-stats .c-good { color: var(--good); }
.result-stats .c-miss { color: var(--miss); }

#retry-btn, #back-btn {
  background: #fff; color: #000; border: none;
  padding: 12px 50px; border-radius: 30px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  letter-spacing: 2px; transition: all 0.2s;
}
#retry-btn:hover, #back-btn:hover { transform: scale(1.04); }
#back-btn { background: #222; color: #aaa; }

/* Particles (in-game effects) */
.particle {
  position: absolute; pointer-events: none; z-index: 18;
  width: 6px; height: 6px; border-radius: 50%;
  animation: particleFly 0.6s forwards;
}
@keyframes particleFly {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}
</style>
</head>
<body>

<div id="app">

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <h1>BEATDROP</h1>
    <div class="subtitle">节奏音游</div>
    <div class="track-list" id="track-list"></div>
    <div class="key-guide">
      <div class="key">D</div>
      <div class="key">F</div>
      <div class="key">J</div>
      <div class="key">K</div>
    </div>
    <button id="start-btn">开始游戏</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div id="hud">
      <span id="score-display">0</span>
      <span id="combo-display"></span>
      <span id="accuracy-display">100%</span>
    </div>
    <div id="health-bar-bg"><div id="health-bar" style="width:100%"></div></div>
    <div id="game-canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="touch-zones">
        <div class="tz" data-lane="0"></div>
        <div class="tz" data-lane="1"></div>
        <div class="tz" data-lane="2"></div>
        <div class="tz" data-lane="3"></div>
      </div>
      <div id="pause-overlay"><h2>暂停</h2><span style="color:#888">按 ESC 继续</span></div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div id="result-grade">S</div>
    <div style="font-size:20px;color:#888;" id="result-track"></div>
    <div id="result-score">0</div>
    <div class="result-stats" id="result-stats"></div>
    <button id="retry-btn">再来一次</button>
    <button id="back-btn">返回选曲</button>
  </div>

</div>

<script>
// ===================== AUDIO ENGINE =====================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.initialized = false;
  }

  async init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.6;
    this.masterGain.connect(this.ctx.destination);
    this.initialized = true;
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  now() {
    return this.ctx ? this.ctx.currentTime : performance.now() / 1000;
  }

  playKick(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    gain.gain.setValueAtTime(0.8, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.2);
  }

  playSnare(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const bufferSize = this.ctx.sampleRate * 0.15;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const bandpass = this.ctx.createBiquadFilter();
    bandpass.type = 'bandpass'; bandpass.frequency.value = 3000; bandpass.Q.value = 1;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    noise.connect(bandpass); bandpass.connect(gain); gain.connect(this.masterGain);
    noise.start(t); noise.stop(t + 0.15);
  }

  playHihat(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const bufferSize = this.ctx.sampleRate * 0.05;
    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize) * 0.4;
    }
    const noise = this.ctx.createBufferSource();
    noise.buffer = buffer;
    const hp = this.ctx.createBiquadFilter();
    hp.type = 'highpass'; hp.frequency.value = 8000;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    noise.connect(hp); hp.connect(gain); gain.connect(this.masterGain);
    noise.start(t); noise.stop(t + 0.05);
  }

  playHitSound(time, lane) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const freqs = [523, 659, 784, 1047]; // C E G C
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freqs[lane];
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.1);
  }

  playMissSound(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.2);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.25);
  }
}

// ===================== TRACK DEFINITIONS =====================
const TRACKS = [
  {
    id: 'starter',
    name: 'Starter Beat',
    bpm: 100,
    difficulty: 'easy',
    diffLabel: 'EASY',
    diffClass: 'diff-easy',
    duration: 30,
    color: '#5eff9e',
  },
  {
    id: 'groove',
    name: 'Groove Street',
    bpm: 135,
    difficulty: 'normal',
    diffLabel: 'NORMAL',
    diffClass: 'diff-normal',
    duration: 35,
    color: '#5ec4ff',
  },
  {
    id: 'neon',
    name: 'Neon Rush',
    bpm: 170,
    difficulty: 'hard',
    diffLabel: 'HARD',
    diffClass: 'diff-hard',
    duration: 40,
    color: '#ff5e7a',
  },
];

// ===================== BEATMAP GENERATOR =====================
function generateBeatmap(bpm, difficulty, duration) {
  const beatDuration = 60 / bpm;
  const notes = [];
  const totalBeats = Math.floor(duration / beatDuration);
  const bars = Math.floor(totalBeats / 4);

  let lastLane = -1;

  function pickLane() {
    let lane;
    do { lane = Math.floor(Math.random() * 4); } while (lane === lastLane && Math.random() < 0.5);
    lastLane = lane;
    return lane;
  }

  function addNote(beat, lane) {
    if (lane === undefined) lane = pickLane();
    else lastLane = lane;
    const time = beat * beatDuration;
    if (time < duration - 0.2) {
      notes.push({ time, lane });
    }
  }

  for (let bar = 0; bar < bars; bar++) {
    const b = bar * 4;
    // Strong beats (1, 2, 3, 4) - always present
    addNote(b);
    addNote(b + 1);
    addNote(b + 2);
    addNote(b + 3);

    if (difficulty === 'normal' || difficulty === 'hard') {
      // 8th note fills
      if (Math.random() < 0.6) addNote(b + 0.5);
      if (Math.random() < 0.5) addNote(b + 1.5);
      if (Math.random() < 0.55) addNote(b + 2.5);
      if (Math.random() < 0.55) addNote(b + 3.5);
    }

    if (difficulty === 'hard') {
      // 16th bursts
      if (Math.random() < 0.35) {
        const start = b + Math.floor(Math.random() * 4);
        for (let i = 0; i < 3; i++) addNote(start + i * 0.25);
      }
      // Double notes
      if (Math.random() < 0.25) {
        const beat = b + Math.floor(Math.random() * 4);
        const lane2 = (lastLane + 2 + Math.floor(Math.random() * 2)) % 4;
        addNote(beat + 0.01, lane2);
      }
    }

    if (difficulty === 'easy' && Math.random() < 0.25) {
      addNote(b + 2.5);
    }
  }

  // Sort by time
  notes.sort((a, b) => a.time - b.time);

  // Remove notes too close on same lane
  const filtered = [];
  const lastTimePerLane = [-1, -1, -1, -1];
  const minGap = { easy: 0.28, normal: 0.18, hard: 0.12 }[difficulty];
  for (const n of notes) {
    if (n.time - lastTimePerLane[n.lane] >= minGap) {
      filtered.push(n);
      lastTimePerLane[n.lane] = n.time;
    }
  }

  return { notes: filtered, duration, bpm, difficulty };
}

// ===================== GAME ENGINE =====================
class Game {
  constructor(audio) {
    this.audio = audio;
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.running = false;
    this.paused = false;

    this.track = null;
    this.beatmap = null;
    this.notes = [];
    this.noteIndex = 0;

    this.score = 0;
    this.combo = 0;
    this.maxCombo = 0;
    this.perfects = 0;
    this.greats = 0;
    this.goods = 0;
    this.misses = 0;
    this.health = 1;
    this.totalJudged = 0;
    this.totalHits = 0;

    this.startTime = 0;
    this.pauseTime = 0;
    this.lastFrame = 0;

    this.judgmentTexts = [];
    this.particles = [];
    this.laneFlash = [0, 0, 0, 0];

    this.scrollSpeed = 420; // px per second
    this.hitWindow = { perfect: 0.05, great: 0.10, good: 0.16 };

    this.keyDown = [false, false, false, false];
    this.judgedNotes = new Set();

    this._bindEvents();
    this._resize();
  }

  _bindEvents() {
    window.addEventListener('resize', () => this._resize());
    document.addEventListener('keydown', e => this._onKey(e, true));
    document.addEventListener('keyup', e => this._onKey(e, false));

    // Touch zones
    const zones = document.querySelectorAll('#touch-zones .tz');
    zones.forEach(z => {
      z.addEventListener('pointerdown', e => { e.preventDefault(); this._hitLane(parseInt(z.dataset.lane)); });
    });

    // Canvas click fallback
    this.canvas.addEventListener('click', e => {
      const lane = this._getLaneFromX(e.offsetX);
      if (lane >= 0) this._hitLane(lane);
    });

    // Pause
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && this.running) this._togglePause();
    });
  }

  _resize() {
    const wrap = document.getElementById('game-canvas-wrap');
    const rect = wrap.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.canvas.style.width = rect.width + 'px';
    this.canvas.style.height = rect.height + 'px';
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    this.ctx.scale(dpr, dpr);
    this.W = rect.width;
    this.H = rect.height;
    this.laneW = (this.W - 16) / 4;
    this.judgeY = this.H * 0.82;
    this.lanePadding = 4;
  }

  _getLaneFromX(x) {
    const laneW = this.laneW;
    for (let i = 0; i < 4; i++) {
      const lx = 4 + i * (laneW + this.lanePadding);
      if (x >= lx && x <= lx + laneW) return i;
    }
    return -1;
  }

  _onKey(e, down) {
    const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
    const lane = keyMap[e.key.toLowerCase()];
    if (lane === undefined) return;
    e.preventDefault();
    if (down && !this.keyDown[lane]) {
      this.keyDown[lane] = true;
      if (this.running && !this.paused) this._hitLane(lane);
    } else if (!down) {
      this.keyDown[lane] = false;
    }
  }

  _togglePause() {
    if (!this.running) return;
    this.paused = !this.paused;
    document.getElementById('pause-overlay').style.display = this.paused ? 'flex' : 'none';
    if (this.paused) {
      this.pauseTime = this.audio.now();
    } else {
      const delta = this.audio.now() - this.pauseTime;
      this.startTime += delta;
    }
  }

  start(track) {
    this.audio.resume();
    this.track = track;
    this.beatmap = generateBeatmap(track.bpm, track.difficulty, track.duration);

    this.score = 0;
    this.combo = 0;
    this.maxCombo = 0;
    this.perfects = 0; this.greats = 0; this.goods = 0; this.misses = 0;
    this.health = 1;
    this.totalJudged = 0; this.totalHits = 0;
    this.noteIndex = 0;
    this.notes = this.beatmap.notes;
    this.judgedNotes = new Set();
    this.judgmentTexts = [];
    this.particles = [];
    this.laneFlash = [0, 0, 0, 0];
    this.startTime = 0;
    this.paused = false;

    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('pause-overlay').style.display = 'none';
    this._updateHUD();

    this._resize();
    this._startAudioSchedule();

    this.running = true;
    this.startTime = this.audio.now();
    this.lastFrame = performance.now();
    requestAnimationFrame(t => this._loop(t));
  }

  _startAudioSchedule() {
    // Schedule all drum sounds
    const { bpm, duration } = this.track;
    const beatDuration = 60 / bpm;
    const totalBeats = Math.ceil(duration / beatDuration);
    for (let beat = 0; beat < totalBeats; beat++) {
      const time = beat * beatDuration;
      if (beat % 1 === 0) this.audio.playKick(time);
      if (beat % 2 === 1) this.audio.playSnare(time);
      if (beat % 0.5 === 0) this.audio.playHihat(time);
    }
  }

  _hitLane(lane) {
    if (!this.running || this.paused) return;
    const now = this.audio.now();
    const gameTime = now - this.startTime;

    // Find closest unjudged note in this lane
    let bestNote = null;
    let bestDiff = Infinity;
    for (let i = 0; i < this.notes.length; i++) {
      if (this.judgedNotes.has(i)) continue;
      const note = this.notes[i];
      if (note.lane !== lane) continue;
      const diff = Math.abs(note.time - gameTime);
      if (diff < bestDiff) {
        bestDiff = diff;
        bestNote = { ...note, index: i };
      }
    }

    if (bestNote && bestDiff < this.hitWindow.good) {
      this.judgedNotes.add(bestNote.index);
      this._judge(bestDiff, lane, bestNote.time);
    }
  }

  _judge(diff, lane, noteTime) {
    let judgment;
    let baseScore;
    if (diff <= this.hitWindow.perfect) {
      judgment = 'Perfect'; baseScore = 300; this.perfects++;
    } else if (diff <= this.hitWindow.great) {
      judgment = 'Great'; baseScore = 200; this.greats++;
    } else {
      judgment = 'Good'; baseScore = 100; this.goods++;
    }

    this.combo++;
    this.maxCombo = Math.max(this.maxCombo, this.combo);
    this.totalHits++;
    this.totalJudged++;

    const comboBonus = Math.min(this.combo, 100);
    this.score += baseScore + comboBonus;

    this.health = Math.min(1, this.health + 0.03);
    this.audio.playHitSound(0, lane);

    this._showJudgment(judgment);
    this._spawnParticles(lane);
    this.laneFlash[lane] = 1;
  }

  _missNote(noteIndex) {
    this.judgedNotes.add(noteIndex);
    this.combo = 0;
    this.misses++;
    this.totalJudged++;
    this.health = Math.max(0, this.health - 0.08);
    this.audio.playMissSound(0);
    this._showJudgment('Miss');
  }

  _showJudgment(text) {
    this.judgmentTexts.push({ text, time: performance.now(), opacity: 1, scale: 0.5 });
    const el = document.getElementById('combo-display');
    if (text === 'Miss') {
      el.classList.add('breaking');
      setTimeout(() => el.classList.remove('breaking'), 300);
    }
  }

  _spawnParticles(lane) {
    const colors = ['#ff5e7a', '#5ec4ff', '#5eff9e', '#ffbe5e'];
    const laneX = 4 + lane * (this.laneW + this.lanePadding) + this.laneW / 2;
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      this.particles.push({
        x: laneX, y: this.judgeY,
        dx: Math.cos(angle) * dist,
        dy: Math.sin(angle) * dist,
        color: colors[lane],
        life: 1,
      });
    }
  }

  _loop(timestamp) {
    if (!this.running) return;
    const dt = Math.min((timestamp - this.lastFrame) / 1000, 0.1);
    this.lastFrame = timestamp;

    if (!this.paused) {
      this._update(dt);
    }
    this._render();
    this._updateHUD();

    const gameTime = this.audio.now() - this.startTime;
    if (gameTime >= this.beatmap.duration + 3 || this.health <= 0) {
      this._endGame();
      return;
    }
    requestAnimationFrame(t => this._loop(t));
  }

  _update(dt) {
    const now = this.audio.now();
    const gameTime = now - this.startTime;

    // Check for missed notes (passed judgment line too long ago)
    for (let i = this.noteIndex; i < this.notes.length; i++) {
      if (this.judgedNotes.has(i)) continue;
      const note = this.notes[i];
      const noteY = this.judgeY - (note.time - gameTime) * this.scrollSpeed;
      if (noteY > this.judgeY + 60) {
        this._missNote(i);
      } else {
        break;
      }
      this.noteIndex = i + 1;
    }

    // Update judgment texts
    for (const jt of this.judgmentTexts) {
      jt.opacity -= dt * 2.2;
      jt.scale += dt * 3;
    }
    this.judgmentTexts = this.judgmentTexts.filter(jt => jt.opacity > 0);

    // Update particles
    for (const p of this.particles) {
      p.x += p.dx * dt;
      p.y += p.dy * dt;
      p.life -= dt * 1.8;
    }
    this.particles = this.particles.filter(p => p.life > 0);

    // Fade lane flash
    for (let i = 0; i < 4; i++) {
      this.laneFlash[i] = Math.max(0, this.laneFlash[i] - dt * 10);
    }

    // Health decay
    this.health = Math.max(0, this.health - dt * 0.005);
  }

  _render() {
    const ctx = this.ctx;
    const { W, H, laneW, judgeY } = this;
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0d0d18';
    ctx.fillRect(0, 0, W, H);

    // Lane backgrounds
    const laneColors = ['#1a0a10', '#0a141a', '#0a1a10', '#1a140a'];
    const laneColorsFlash = ['#ff5e7a', '#5ec4ff', '#5eff9e', '#ffbe5e'];
    const laneGap = this.lanePadding;

    for (let i = 0; i < 4; i++) {
      const lx = 4 + i * (laneW + laneGap);
      // Lane bg
      ctx.fillStyle = laneColors[i];
      ctx.fillRect(lx, 0, laneW, H);
      // Lane border
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 1;
      ctx.strokeRect(lx, 0, laneW, H);

      // Flash overlay
      if (this.laneFlash[i] > 0.01) {
        ctx.fillStyle = laneColorsFlash[i] + Math.round(this.laneFlash[i] * 40).toString(16).padStart(2, '0');
        ctx.fillRect(lx, 0, laneW, H);
      }
    }

    // Judgment line
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(0, judgeY); ctx.lineTo(W, judgeY);
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Glow on judgment line
    const glowGrad = ctx.createLinearGradient(0, judgeY - 4, 0, judgeY + 4);
    glowGrad.addColorStop(0, 'rgba(255,255,255,0)');
    glowGrad.addColorStop(0.5, 'rgba(255,255,255,0.15)');
    glowGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, judgeY - 4, W, 8);

    // Notes
    const gameTime = this.audio.now() - this.startTime;
    const noteColors = ['#ff5e7a', '#5ec4ff', '#5eff9e', '#ffbe5e'];

    for (let i = 0; i < this.notes.length; i++) {
      if (this.judgedNotes.has(i)) continue;
      const note = this.notes[i];
      const noteY = judgeY - (note.time - gameTime) * this.scrollSpeed;

      if (noteY < -30 || noteY > H + 30) continue;

      const lx = 4 + note.lane * (laneW + laneGap);
      const noteH = 14;
      const noteW = laneW - 8;
      const nx = lx + 4;
      const ny = noteY - noteH / 2;

      // Note shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(nx + 2, ny + 2, noteW, noteH);

      // Note body
      const noteGrad = ctx.createLinearGradient(nx, ny, nx, ny + noteH);
      noteGrad.addColorStop(0, noteColors[note.lane]);
      noteGrad.addColorStop(1, noteColors[note.lane] + '88');
      ctx.fillStyle = noteGrad;
      ctx.beginPath();
      ctx.roundRect(nx, ny, noteW, noteH, 4);
      ctx.fill();

      // Note top highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.roundRect(nx, ny, noteW, noteH / 2, [4, 4, 0, 0]);
      ctx.fill();
    }

    // Particles
    for (const p of this.particles) {
      ctx.fillStyle = p.color + Math.round(p.life * 200).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
      ctx.fill();
    }

    // Judgment text (rendered on canvas)
    for (const jt of this.judgmentTexts) {
      ctx.save();
      ctx.globalAlpha = jt.opacity;
      ctx.font = `bold ${24 * jt.scale}px "Segoe UI", system-ui, sans-serif`;
      ctx.textAlign = 'center';
      const colorMap = { 'Perfect': '#ffdd57', 'Great': '#5ec4ff', 'Good': '#5eff9e', 'Miss': '#ff5e7a' };
      ctx.fillStyle = colorMap[jt.text] || '#fff';
      ctx.fillText(jt.text, W / 2, judgeY - 60 - (1 - jt.opacity) * 30);
      ctx.restore();
    }

    // Lane labels at bottom
    ctx.fillStyle = '#333';
    ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign = 'center';
    const laneLabels = ['D', 'F', 'J', 'K'];
    for (let i = 0; i < 4; i++) {
      const lx = 4 + i * (laneW + laneGap) + laneW / 2;
      ctx.fillText(laneLabels[i], lx, H - 12);
    }
  }

  _updateHUD() {
    document.getElementById('score-display').textContent = this.score.toLocaleString();
    const comboEl = document.getElementById('combo-display');
    if (this.combo >= 10) {
      comboEl.textContent = `${this.combo} Combo`;
      comboEl.style.color = this.combo >= 50 ? '#ffdd57' : this.combo >= 25 ? '#5ec4ff' : '#fff';
    } else {
      comboEl.textContent = '';
    }
    const total = this.totalJudged || 1;
    const acc = Math.round((this.totalHits / total) * 10000) / 100;
    document.getElementById('accuracy-display').textContent = acc + '%';
    document.getElementById('health-bar').style.width = (this.health * 100) + '%';
  }

  _endGame() {
    this.running = false;
    document.getElementById('game-screen').style.display = 'none';

    const total = this.totalJudged || 1;
    const acc = this.totalHits / total;

    let grade;
    if (acc >= 0.98 && this.misses === 0) grade = 'SS';
    else if (acc >= 0.95) grade = 'S';
    else if (acc >= 0.85) grade = 'A';
    else if (acc >= 0.70) grade = 'B';
    else if (acc >= 0.50) grade = 'C';
    else grade = 'D';

    document.getElementById('result-grade').textContent = grade;
    document.getElementById('result-track').textContent = this.track.name + ' [' + this.track.diffLabel + ']';
    document.getElementById('result-score').textContent = this.score.toLocaleString() + ' pts';
    document.getElementById('result-stats').innerHTML = `
      <span class="c-perfect">Perfect</span><span class="c-perfect">${this.perfects}</span>
      <span class="c-great">Great</span><span class="c-great">${this.greats}</span>
      <span class="c-good">Good</span><span class="c-good">${this.goods}</span>
      <span class="c-miss">Miss</span><span class="c-miss">${this.misses}</span>
      <span>Max Combo</span><span>${this.maxCombo}</span>
      <span>Accuracy</span><span>${Math.round(acc * 10000) / 100}%</span>
    `;

    document.getElementById('result-screen').style.display = 'flex';
  }
}

// ===================== APP BOOTSTRAP =====================
const audio = new AudioEngine();
const game = new Game(audio);
let selectedTrackIdx = 1; // default: Groove Street

function renderTrackList() {
  const list = document.getElementById('track-list');
  list.innerHTML = TRACKS.map((t, i) => `
    <div class="track-card ${i === selectedTrackIdx ? 'selected' : ''}" data-idx="${i}">
      <div>
        <div class="track-name">${t.name}</div>
        <div class="track-meta">BPM ${t.bpm} · ${Math.floor(t.duration)}s</div>
      </div>
      <div class="track-diff ${t.diffClass}">${t.diffLabel}</div>
    </div>
  `).join('');

  list.querySelectorAll('.track-card').forEach(card => {
    card.addEventListener('click', () => {
      selectedTrackIdx = parseInt(card.dataset.idx);
      renderTrackList();
    });
  });
}

document.getElementById('start-btn').addEventListener('click', async () => {
  await audio.init();
  game.start(TRACKS[selectedTrackIdx]);
});

document.getElementById('retry-btn').addEventListener('click', () => {
  game.start(TRACKS[selectedTrackIdx]);
});

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  renderTrackList();
});

// Initialize
renderTrackList();
console.log('🎵 BeatDrop ready! Select a track and press START');
console.log('⌨️  Controls: D F J K  (or tap lanes on mobile)');
console.log('⏸️  Press ESC to pause');
