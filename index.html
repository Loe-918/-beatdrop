<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BeatDrop - 节奏音游</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #151520;
  --text: #e0e0f0;
  --lane1: #ff5e7a;
  --lane2: #5ec4ff;
  --lane3: #5eff9e;
  --lane4: #ffbe5e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex; justify-content: center; align-items: center;
  height: 100dvh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

#app {
  width: 100%; max-width: 520px; height: 100dvh;
  display: flex; flex-direction: column;
  position: relative;
}

/* ===== TITLE SCREEN ===== */
#title-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 20px;
  overflow-y: auto;
}
#title-screen h1 {
  font-size: 42px; font-weight: 900;
  background: linear-gradient(135deg, var(--lane1), var(--lane2), var(--lane3), var(--lane4));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 4px;
}
.subtitle { color: #888; font-size: 13px; letter-spacing: 8px; }

.section-label {
  color: #555; font-size: 11px; letter-spacing: 4px;
  align-self: center; margin-top: 2px;
}

.track-list { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 400px; }
.track-card {
  background: var(--surface); border: 2px solid #222;
  border-radius: 12px; padding: 12px 16px;
  cursor: pointer; transition: all 0.2s;
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px;
}
.track-card:hover { border-color: var(--lane2); box-shadow: 0 0 16px rgba(94,196,255,0.12); }
.track-card.selected { border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.18); }
.track-name { font-size: 16px; font-weight: 700; }
.track-meta { color: #777; font-size: 12px; }
.track-diff {
  font-size: 11px; font-weight: 700; padding: 3px 8px;
  border-radius: 20px; letter-spacing: 1px;
}
.diff-easy { background: #5eff9e22; color: var(--lane3); }
.diff-normal { background: #5ec4ff22; color: var(--lane2); }
.diff-hard { background: #ff5e7a22; color: var(--lane1); }
.diff-custom { background: #ffbe5e22; color: var(--lane4); }

/* Upload area */
#upload-area {
  width: 100%; max-width: 400px;
  border: 2px dashed #2a2a3a; border-radius: 12px;
  padding: 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; background: var(--surface);
}
#upload-area:hover, #upload-area.dragover {
  border-color: var(--lane4);
  background: #1a1a28;
}
#upload-area.has-file {
  border-color: var(--lane4); border-style: solid;
  background: #1a1410;
}
#upload-icon { font-size: 32px; margin-bottom: 6px; }
#upload-text { color: #777; font-size: 13px; }
#upload-file-name { color: var(--lane4); font-size: 14px; font-weight: 600; display: none; }
#upload-file-info { color: #666; font-size: 11px; display: none; margin-top: 4px; }
#upload-status { color: var(--lane2); font-size: 12px; display: none; margin-top: 4px; }
#file-input { display: none; }

/* Sensitivity slider */
#sensitivity-row {
  display: none; align-items: center; gap: 10px;
  width: 100%; max-width: 400px;
}
#sensitivity-row label { color: #888; font-size: 13px; white-space: nowrap; }
#sensitivity-row input[type=range] { flex: 1; accent-color: var(--lane4); }
#sensitivity-val { color: var(--lane4); font-size: 13px; font-weight: 700; min-width: 40px; text-align: center; }

.key-guide { display: flex; gap: 18px; }
.key {
  width: 42px; height: 42px; border-radius: 10px;
  border: 2px solid #333; display: flex;
  align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  color: #666; background: #111;
}
.key:nth-child(1) { border-color: var(--lane1); color: var(--lane1); }
.key:nth-child(2) { border-color: var(--lane2); color: var(--lane2); }
.key:nth-child(3) { border-color: var(--lane3); color: var(--lane3); }
.key:nth-child(4) { border-color: var(--lane4); color: var(--lane4); }

#start-btn {
  background: #fff; color: #000; border: none;
  padding: 12px 50px; border-radius: 30px;
  font-size: 17px; font-weight: 700; cursor: pointer;
  letter-spacing: 2px; transition: all 0.2s;
  margin-top: 4px;
}
#start-btn:hover { transform: scale(1.04); box-shadow: 0 0 30px rgba(255,255,255,0.3); }
#start-btn:active { transform: scale(0.96); }
#start-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

/* ===== GAME SCREEN ===== */
#game-screen { flex: 1; display: none; flex-direction: column; position: relative; }
#hud { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; z-index: 10; }
#score-display { font-size: 28px; font-weight: 900; letter-spacing: 1px; }
#combo-display { font-size: 20px; font-weight: 700; transition: all 0.1s; }
#combo-display.breaking { color: var(--lane1); animation: shake 0.3s; }
#accuracy-display { font-size: 14px; color: #888; }
#health-bar-bg { height: 4px; background: #222; margin: 0 16px; border-radius: 2px; overflow: hidden; }
#health-bar { height: 100%; background: linear-gradient(90deg, var(--lane1), var(--lane3), var(--lane2)); border-radius: 2px; transition: width 0.3s; }

#game-canvas-wrap { flex: 1; position: relative; margin: 0 8px 8px; }
#game-canvas { width: 100%; height: 100%; display: block; border-radius: 12px; background: #0d0d18; }

#touch-zones { display: none; position: absolute; bottom: 0; left: 8px; right: 8px; height: 80px; z-index: 15; }
@media (max-width: 600px) { #touch-zones { display: flex; } }
#touch-zones .tz { flex: 1; height: 100%; }

#pause-overlay { display: none; position: absolute; inset: 0; z-index: 30; background: rgba(0,0,0,0.8); flex-direction: column; align-items: center; justify-content: center; gap: 16px; border-radius: 12px; }
#pause-overlay h2 { font-size: 32px; letter-spacing: 4px; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ===== RESULT SCREEN ===== */
#result-screen {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; padding: 24px;
}
#result-grade { font-size: 72px; font-weight: 900; background: linear-gradient(135deg, var(--lane4), var(--lane2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
#result-score { font-size: 30px; font-weight: 700; }
.result-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; font-size: 14px; }
.result-stats span:nth-child(even) { text-align: right; font-weight: 700; }
.c-perfect { color: #ffdd57; }
.c-great { color: var(--lane2); }
.c-good { color: var(--lane3); }
.c-miss { color: var(--lane1); }

#retry-btn, #back-btn {
  background: #fff; color: #000; border: none;
  padding: 10px 44px; border-radius: 30px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  letter-spacing: 2px; transition: all 0.2s;
}
#retry-btn:hover, #back-btn:hover { transform: scale(1.04); }
#back-btn { background: #222; color: #aaa; }
</style>
</head>
<body>

<div id="app">

  <!-- TITLE SCREEN -->
  <div id="title-screen">
    <h1>BEATDROP</h1>
    <div class="subtitle">节奏音游</div>

    <div class="section-label">内置曲目</div>
    <div class="track-list" id="track-list"></div>

    <div class="section-label" style="margin-top:6px;">上传你自己的音乐</div>
    <div id="upload-area">
      <div id="upload-icon">🎵</div>
      <div id="upload-text">点击或拖拽 MP3 / WAV / OGG 到此</div>
      <div id="upload-file-name"></div>
      <div id="upload-file-info"></div>
      <div id="upload-status"></div>
      <input type="file" id="file-input" accept="audio/*">
    </div>

    <div id="sensitivity-row">
      <label>灵敏度</label>
      <input type="range" id="sensitivity-slider" min="1" max="5" value="3" step="0.5">
      <span id="sensitivity-val">中</span>
    </div>

    <div class="key-guide">
      <div class="key">D</div>
      <div class="key">F</div>
      <div class="key">J</div>
      <div class="key">K</div>
    </div>
    <button id="start-btn">开始游戏</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div id="hud">
      <span id="score-display">0</span>
      <span id="combo-display"></span>
      <span id="accuracy-display">100%</span>
    </div>
    <div id="health-bar-bg"><div id="health-bar" style="width:100%"></div></div>
    <div id="game-canvas-wrap">
      <canvas id="game-canvas"></canvas>
      <div id="touch-zones">
        <div class="tz" data-lane="0"></div>
        <div class="tz" data-lane="1"></div>
        <div class="tz" data-lane="2"></div>
        <div class="tz" data-lane="3"></div>
      </div>
      <div id="pause-overlay"><h2>暂停</h2><span style="color:#888">按 ESC 继续</span></div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen">
    <div id="result-grade">S</div>
    <div style="font-size:18px;color:#888;" id="result-track"></div>
    <div id="result-score">0</div>
    <div class="result-stats" id="result-stats"></div>
    <button id="retry-btn">再来一次</button>
    <button id="back-btn">返回选曲</button>
  </div>

</div>

<script>
// ===================== AUDIO ENGINE =====================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.initialized = false;
  }

  async init() {
    if (this.initialized) return;
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = 0.6;
    this.masterGain.connect(this.ctx.destination);
    this.initialized = true;
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  now() { return this.ctx ? this.ctx.currentTime : performance.now() / 1000; }

  // Synth drums (built-in tracks)
  playKick(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(150, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.15);
    gain.gain.setValueAtTime(0.8, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.2);
  }

  playSnare(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const sz = this.ctx.sampleRate * 0.15;
    const buf = this.ctx.createBuffer(1, sz, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < sz; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / sz);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const bp = this.ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 3000; bp.Q.value = 1;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.connect(bp); bp.connect(g); g.connect(this.masterGain);
    src.start(t); src.stop(t + 0.15);
  }

  playHihat(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const sz = this.ctx.sampleRate * 0.05;
    const buf = this.ctx.createBuffer(1, sz, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < sz; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / sz) * 0.4;
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const hp = this.ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 8000;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    src.connect(hp); hp.connect(g); g.connect(this.masterGain);
    src.start(t); src.stop(t + 0.05);
  }

  // Hit feedback sounds
  playHitSound(time, lane) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const freqs = [523, 659, 784, 1047];
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freqs[lane];
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.1);
  }

  playMissSound(time) {
    if (!this.ctx) return;
    const t = this.ctx.currentTime + time;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(80, t);
    osc.frequency.exponentialRampToValueAtTime(30, t + 0.2);
    gain.gain.setValueAtTime(0.15, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(gain); gain.connect(this.masterGain);
    osc.start(t); osc.stop(t + 0.25);
  }

  // Play uploaded audio buffer
  playAudioBuffer(buffer, offset) {
    if (!this.ctx) return null;
    const src = this.ctx.createBufferSource();
    src.buffer = buffer;
    const gain = this.ctx.createGain();
    gain.gain.value = 0.7;
    src.connect(gain); gain.connect(this.masterGain);
    src.start(this.ctx.currentTime, offset || 0);
    return src;
  }
}

// ===================== BUILT-IN TRACKS =====================
const TRACKS = [
  { id: 'starter', name: 'Starter Beat', bpm: 100, difficulty: 'easy', diffLabel: 'EASY', diffClass: 'diff-easy', duration: 30 },
  { id: 'groove', name: 'Groove Street', bpm: 135, difficulty: 'normal', diffLabel: 'NORMAL', diffClass: 'diff-normal', duration: 35 },
  { id: 'neon', name: 'Neon Rush', bpm: 170, difficulty: 'hard', diffLabel: 'HARD', diffClass: 'diff-hard', duration: 40 },
];

// ===================== BUILT-IN BEATMAP GENERATOR =====================
function generateBeatmap(bpm, difficulty, duration) {
  const beatDuration = 60 / bpm;
  const notes = [];
  const bars = Math.floor(duration / beatDuration / 4);
  let lastLane = -1;

  function pickLane() {
    let lane;
    do { lane = Math.floor(Math.random() * 4); } while (lane === lastLane && Math.random() < 0.5);
    lastLane = lane; return lane;
  }
  function addNote(beat, lane) {
    if (lane === undefined) lane = pickLane(); else lastLane = lane;
    const time = beat * beatDuration;
    if (time < duration - 0.2) notes.push({ time, lane });
  }

  for (let bar = 0; bar < bars; bar++) {
    const b = bar * 4;
    addNote(b); addNote(b + 1); addNote(b + 2); addNote(b + 3);
    if (difficulty === 'normal' || difficulty === 'hard') {
      if (Math.random() < 0.6) addNote(b + 0.5);
      if (Math.random() < 0.5) addNote(b + 1.5);
      if (Math.random() < 0.55) addNote(b + 2.5);
      if (Math.random() < 0.55) addNote(b + 3.5);
    }
    if (difficulty === 'hard') {
      if (Math.random() < 0.35) { const s = b + Math.floor(Math.random() * 4); for (let i = 0; i < 3; i++) addNote(s + i * 0.25); }
      if (Math.random() < 0.25) addNote(b + Math.floor(Math.random() * 4) + 0.01, (lastLane + 2 + Math.floor(Math.random() * 2)) % 4);
    }
    if (difficulty === 'easy' && Math.random() < 0.25) addNote(b + 2.5);
  }

  notes.sort((a, b) => a.time - b.time);
  const filtered = [];
  const ltl = [-1, -1, -1, -1];
  const mg = { easy: 0.28, normal: 0.18, hard: 0.12 }[difficulty];
  for (const n of notes) {
    if (n.time - ltl[n.lane] >= mg) { filtered.push(n); ltl[n.lane] = n.time; }
  }
  return { notes: filtered, duration, bpm, difficulty };
}

// ===================== BEAT DETECTION =====================
function detectBeats(audioBuffer, sensitivity) {
  const sr = audioBuffer.sampleRate;
  const data = audioBuffer.getChannelData(0);
  const totalSamples = data.length;
  const duration = totalSamples / sr;

  // Energy-based onset detection with local adaptive threshold
  const windowMs = 23;
  const hopMs = 11.5;
  const windowSize = Math.floor(sr * windowMs / 1000);
  const hopSize = Math.floor(sr * hopMs / 1000);
  const numWindows = Math.floor((totalSamples - windowSize) / hopSize);

  if (numWindows < 10) return { onsets: [], duration, bpm: 0 };

  // Compute RMS energy for each window
  const energies = new Float32Array(numWindows);
  for (let i = 0; i < numWindows; i++) {
    const start = i * hopSize;
    let sum = 0;
    for (let j = 0; j < windowSize; j++) sum += data[start + j] * data[start + j];
    energies[i] = Math.sqrt(sum / windowSize);
  }

  // Smooth with 3-point moving average
  const smoothed = new Float32Array(numWindows);
  for (let i = 0; i < numWindows; i++) {
    let sum = 0, n = 0;
    for (let j = Math.max(0, i - 2); j < Math.min(numWindows, i + 3); j++) { sum += energies[j]; n++; }
    smoothed[i] = sum / n;
  }

  // Adaptive threshold: local average over ~500ms
  const localWindow = Math.floor(0.5 * sr / hopSize);
  // Lower thresholdMult = more notes detected
  const thresholdMult = 2.6 - (sensitivity - 1) * 0.45;
  const floor = 0.12 - (sensitivity - 1) * 0.025;

  const onsets = [];
  let lastOnsetTime = -1;

  for (let i = localWindow; i < numWindows; i++) {
    let localSum = 0;
    for (let j = i - localWindow; j < i; j++) localSum += smoothed[j];
    const localAvg = localSum / localWindow;
    const threshold = Math.max(localAvg * thresholdMult, floor);

    if (smoothed[i] > threshold) {
      // Check local peak in ±40ms
      const peakWin = Math.floor(0.04 * sr / hopSize);
      let isPeak = true;
      for (let j = Math.max(0, i - peakWin); j < Math.min(numWindows, i + peakWin + 1); j++) {
        if (j !== i && smoothed[j] >= smoothed[i]) { isPeak = false; break; }
      }
      if (isPeak) {
        const t = i * hopSize / sr;
        if (t - lastOnsetTime > 0.1) {
          onsets.push(t);
          lastOnsetTime = t;
        }
      }
    }
  }

  // Estimate BPM
  let bpm = 0;
  if (onsets.length > 3) {
    const intervals = [];
    for (let i = 1; i < onsets.length; i++) intervals.push(onsets[i] - onsets[i - 1]);
    intervals.sort((a, b) => a - b);
    const median = intervals[Math.floor(intervals.length / 2)];
    if (median > 0) {
      const rawBpm = 60 / median;
      const common = [60, 70, 80, 90, 100, 110, 120, 128, 130, 135, 140, 145, 150, 155, 160, 170, 174, 180, 190, 200];
      bpm = common.reduce((a, b) => Math.abs(b - rawBpm) < Math.abs(a - rawBpm) ? b : a);
      if (Math.abs(bpm * 2 - rawBpm) < Math.abs(bpm - rawBpm)) bpm *= 2;
      if (Math.abs(bpm / 2 - rawBpm) < Math.abs(bpm - rawBpm)) bpm = Math.round(bpm / 2);
    }
  }

  return { onsets, duration, bpm };
}

function onsetsToBeatmap(onsets, duration) {
  let lastLane = -1;
  const notes = [];
  for (const time of onsets) {
    if (time >= duration - 0.3) continue;
    let lane;
    do { lane = Math.floor(Math.random() * 4); } while (lane === lastLane && onsets.length > 4);
    lastLane = lane;
    notes.push({ time, lane });
  }
  // Remove same-lane notes too close together
  const filtered = [];
  const ltl = [-1, -1, -1, -1];
  for (const n of notes) {
    if (n.time - ltl[n.lane] >= 0.18) { filtered.push(n); ltl[n.lane] = n.time; }
  }
  return { notes: filtered, duration, bpm: 0, difficulty: 'custom' };
}

// ===================== GAME ENGINE =====================
class Game {
  constructor(audio) {
    this.audio = audio;
    this.canvas = document.getElementById('game-canvas');
    this.ctx = this.canvas.getContext('2d');
    this.running = false;
    this.paused = false;
    this.track = null;
    this.beatmap = null;
    this.notes = [];
    this.isCustom = false;
    this.customBuffer = null;
    this.musicSource = null;
    this.musicPausedAt = null;
    this.score = 0;
    this.combo = 0;
    this.maxCombo = 0;
    this.perfects = 0; this.greats = 0; this.goods = 0; this.misses = 0;
    this.health = 1;
    this.totalJudged = 0; this.totalHits = 0;
    this.startTime = 0;
    this.pauseTime = 0;
    this.lastFrame = 0;
    this.judgmentTexts = [];
    this.particles = [];
    this.laneFlash = [0, 0, 0, 0];
    this.scrollSpeed = 420;
    this.hitWindow = { perfect: 0.05, great: 0.10, good: 0.16 };
    this.keyDown = [false, false, false, false];
    this.judgedNotes = new Set();
    this._bindEvents();
    this._resize();
  }

  _bindEvents() {
    window.addEventListener('resize', () => this._resize());
    document.addEventListener('keydown', e => this._onKey(e, true));
    document.addEventListener('keyup', e => this._onKey(e, false));
    document.querySelectorAll('#touch-zones .tz').forEach(z => {
      z.addEventListener('pointerdown', e => { e.preventDefault(); this._hitLane(parseInt(z.dataset.lane)); });
    });
    this.canvas.addEventListener('click', e => {
      const lane = this._getLaneFromX(e.offsetX);
      if (lane >= 0) this._hitLane(lane);
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && this.running) this._togglePause();
    });
  }

  _resize() {
    const wrap = document.getElementById('game-canvas-wrap');
    const rect = wrap.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.canvas.width = rect.width * dpr;
    this.canvas.height = rect.height * dpr;
    this.canvas.style.width = rect.width + 'px';
    this.canvas.style.height = rect.height + 'px';
    this.ctx.setTransform(1, 0, 0, 1, 0, 0);
    this.ctx.scale(dpr, dpr);
    this.W = rect.width;
    this.H = rect.height;
    this.laneW = (this.W - 16) / 4;
    this.judgeY = this.H * 0.82;
    this.lanePadding = 4;
  }

  _getLaneFromX(x) {
    for (let i = 0; i < 4; i++) {
      const lx = 4 + i * (this.laneW + this.lanePadding);
      if (x >= lx && x <= lx + this.laneW) return i;
    }
    return -1;
  }

  _onKey(e, down) {
    const keyMap = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
    const lane = keyMap[e.key.toLowerCase()];
    if (lane === undefined) return;
    e.preventDefault();
    if (down && !this.keyDown[lane]) {
      this.keyDown[lane] = true;
      if (this.running && !this.paused) this._hitLane(lane);
    } else if (!down) { this.keyDown[lane] = false; }
  }

  _togglePause() {
    if (!this.running) return;
    this.paused = !this.paused;
    document.getElementById('pause-overlay').style.display = this.paused ? 'flex' : 'none';
    if (this.paused) {
      this.pauseTime = this.audio.now();
      if (this.musicSource) { try { this.musicSource.stop(); } catch(e) {} this.musicPausedAt = this.audio.now() - this.startTime; }
    } else {
      const delta = this.audio.now() - this.pauseTime;
      this.startTime += delta;
      if (this.customBuffer && this.musicPausedAt != null) {
        this.musicSource = this.audio.playAudioBuffer(this.customBuffer, this.musicPausedAt);
      }
    }
  }

  start(track, opts) {
    opts = opts || {};
    this.audio.resume();
    this.track = track;
    this.isCustom = !!opts.custom;
    this.customBuffer = opts.buffer || null;

    if (this.isCustom && opts.beatmap) {
      this.beatmap = opts.beatmap;
    } else {
      this.beatmap = generateBeatmap(track.bpm, track.difficulty, track.duration);
    }

    this.score = 0; this.combo = 0; this.maxCombo = 0;
    this.perfects = 0; this.greats = 0; this.goods = 0; this.misses = 0;
    this.health = 1; this.totalJudged = 0; this.totalHits = 0;
    this.notes = this.beatmap.notes;
    this.judgedNotes = new Set();
    this.judgmentTexts = []; this.particles = []; this.laneFlash = [0, 0, 0, 0];
    this.startTime = 0; this.paused = false;
    this.musicSource = null; this.musicPausedAt = null;

    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('pause-overlay').style.display = 'none';
    this._updateHUD();
    this._resize();

    if (this.isCustom && this.customBuffer) {
      this.musicSource = this.audio.playAudioBuffer(this.customBuffer, 0);
    } else {
      this._startSynthDrums();
    }

    this.running = true;
    this.startTime = this.audio.now();
    this.lastFrame = performance.now();
    requestAnimationFrame(t => this._loop(t));
  }

  _startSynthDrums() {
    const beatDuration = 60 / this.track.bpm;
    const totalBeats = Math.ceil(this.track.duration / beatDuration);
    for (let beat = 0; beat < totalBeats; beat++) {
      const time = beat * beatDuration;
      if (beat % 1 === 0) this.audio.playKick(time);
      if (beat % 2 === 1) this.audio.playSnare(time);
      if (beat % 0.5 === 0) this.audio.playHihat(time);
    }
  }

  _hitLane(lane) {
    if (!this.running || this.paused) return;
    const gameTime = this.audio.now() - this.startTime;
    let bestIdx = -1, bestDiff = Infinity;
    for (let i = 0; i < this.notes.length; i++) {
      if (this.judgedNotes.has(i)) continue;
      if (this.notes[i].lane !== lane) continue;
      const diff = Math.abs(this.notes[i].time - gameTime);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    }
    if (bestIdx >= 0 && bestDiff < this.hitWindow.good) {
      this.judgedNotes.add(bestIdx);
      this._judge(bestDiff, lane);
    }
  }

  _judge(diff, lane) {
    let judgment, base;
    if (diff <= this.hitWindow.perfect) { judgment = 'Perfect'; base = 300; this.perfects++; }
    else if (diff <= this.hitWindow.great) { judgment = 'Great'; base = 200; this.greats++; }
    else { judgment = 'Good'; base = 100; this.goods++; }
    this.combo++; this.maxCombo = Math.max(this.maxCombo, this.combo);
    this.totalHits++; this.totalJudged++;
    this.score += base + Math.min(this.combo, 100);
    this.health = Math.min(1, this.health + 0.03);
    this.audio.playHitSound(0, lane);
    this._showJudgment(judgment);
    this._spawnParticles(lane);
    this.laneFlash[lane] = 1;
  }

  _missNote(idx) {
    this.judgedNotes.add(idx);
    this.combo = 0; this.misses++; this.totalJudged++;
    this.health = Math.max(0, this.health - 0.08);
    this.audio.playMissSound(0);
    this._showJudgment('Miss');
  }

  _showJudgment(text) {
    this.judgmentTexts.push({ text, opacity: 1, scale: 0.5 });
    if (text === 'Miss') {
      const el = document.getElementById('combo-display');
      el.classList.add('breaking');
      setTimeout(() => el.classList.remove('breaking'), 300);
    }
  }

  _spawnParticles(lane) {
    const colors = ['#ff5e7a', '#5ec4ff', '#5eff9e', '#ffbe5e'];
    const lx = 4 + lane * (this.laneW + this.lanePadding) + this.laneW / 2;
    for (let i = 0; i < 8; i++) {
      const a = Math.random() * Math.PI * 2;
      const d = 30 + Math.random() * 60;
      this.particles.push({ x: lx, y: this.judgeY, dx: Math.cos(a) * d, dy: Math.sin(a) * d, color: colors[lane], life: 1 });
    }
  }

  _loop(timestamp) {
    if (!this.running) return;
    const dt = Math.min((timestamp - this.lastFrame) / 1000, 0.1);
    this.lastFrame = timestamp;
    if (!this.paused) this._update(dt);
    this._render();
    this._updateHUD();
    const gameTime = this.audio.now() - this.startTime;
    if (gameTime >= this.beatmap.duration + 3 || this.health <= 0) {
      this._endGame();
      return;
    }
    requestAnimationFrame(t => this._loop(t));
  }

  _update(dt) {
    const gameTime = this.audio.now() - this.startTime;
    for (let i = 0; i < this.notes.length; i++) {
      if (this.judgedNotes.has(i)) continue;
      if (this.judgeY - (this.notes[i].time - gameTime) * this.scrollSpeed > this.judgeY + 60) {
        this._missNote(i);
      } else break;
    }
    for (const jt of this.judgmentTexts) { jt.opacity -= dt * 2.2; jt.scale += dt * 3; }
    this.judgmentTexts = this.judgmentTexts.filter(jt => jt.opacity > 0);
    for (const p of this.particles) { p.x += p.dx * dt; p.y += p.dy * dt; p.life -= dt * 1.8; }
    this.particles = this.particles.filter(p => p.life > 0);
    for (let i = 0; i < 4; i++) this.laneFlash[i] = Math.max(0, this.laneFlash[i] - dt * 10);
    this.health = Math.max(0, this.health - dt * 0.005);
  }

  _render() {
    const ctx = this.ctx;
    const { W, H, laneW, judgeY } = this;
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0d0d18'; ctx.fillRect(0, 0, W, H);

    const laneColors = ['#1a0a10', '#0a141a', '#0a1a10', '#1a140a'];
    const laneFlashColors = ['#ff5e7a', '#5ec4ff', '#5eff9e', '#ffbe5e'];
    const noteColors = ['#ff5e7a', '#5ec4ff', '#5eff9e', '#ffbe5e'];
    const laneGap = this.lanePadding;

    for (let i = 0; i < 4; i++) {
      const lx = 4 + i * (laneW + laneGap);
      ctx.fillStyle = laneColors[i]; ctx.fillRect(lx, 0, laneW, H);
      ctx.strokeStyle = '#1a1a2e'; ctx.lineWidth = 1; ctx.strokeRect(lx, 0, laneW, H);
      if (this.laneFlash[i] > 0.01) {
        ctx.fillStyle = laneFlashColors[i] + Math.round(this.laneFlash[i] * 40).toString(16).padStart(2, '0');
        ctx.fillRect(lx, 0, laneW, H);
      }
    }

    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.globalAlpha = 0.6;
    ctx.beginPath(); ctx.moveTo(0, judgeY); ctx.lineTo(W, judgeY); ctx.stroke();
    ctx.globalAlpha = 1;
    const glow = ctx.createLinearGradient(0, judgeY - 4, 0, judgeY + 4);
    glow.addColorStop(0, 'rgba(255,255,255,0)'); glow.addColorStop(0.5, 'rgba(255,255,255,0.15)'); glow.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glow; ctx.fillRect(0, judgeY - 4, W, 8);

    const gameTime = this.audio.now() - this.startTime;
    for (let i = 0; i < this.notes.length; i++) {
      if (this.judgedNotes.has(i)) continue;
      const note = this.notes[i];
      const noteY = judgeY - (note.time - gameTime) * this.scrollSpeed;
      if (noteY < -30 || noteY > H + 30) continue;
      const lx = 4 + note.lane * (laneW + laneGap);
      const nh = 14, nw = laneW - 8, nx = lx + 4, ny = noteY - nh / 2;
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(nx + 2, ny + 2, nw, nh);
      const grad = ctx.createLinearGradient(nx, ny, nx, ny + nh);
      grad.addColorStop(0, noteColors[note.lane]); grad.addColorStop(1, noteColors[note.lane] + '88');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh, 4); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.roundRect(nx, ny, nw, nh / 2, [4, 4, 0, 0]); ctx.fill();
    }

    for (const p of this.particles) {
      ctx.fillStyle = p.color + Math.round(p.life * 200).toString(16).padStart(2, '0');
      ctx.beginPath(); ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2); ctx.fill();
    }

    for (const jt of this.judgmentTexts) {
      ctx.save(); ctx.globalAlpha = jt.opacity;
      ctx.font = 'bold ' + (24 * jt.scale) + 'px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = 'center';
      const cm = { 'Perfect': '#ffdd57', 'Great': '#5ec4ff', 'Good': '#5eff9e', 'Miss': '#ff5e7a' };
      ctx.fillStyle = cm[jt.text] || '#fff';
      ctx.fillText(jt.text, W / 2, judgeY - 60 - (1 - jt.opacity) * 30);
      ctx.restore();
    }

    ctx.fillStyle = '#333'; ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif'; ctx.textAlign = 'center';
    ['D', 'F', 'J', 'K'].forEach((l, i) => {
      ctx.fillText(l, 4 + i * (laneW + laneGap) + laneW / 2, H - 12);
    });
  }

  _updateHUD() {
    document.getElementById('score-display').textContent = this.score.toLocaleString();
    const comboEl = document.getElementById('combo-display');
    if (this.combo >= 10) {
      comboEl.textContent = this.combo + ' Combo';
      comboEl.style.color = this.combo >= 50 ? '#ffdd57' : this.combo >= 25 ? '#5ec4ff' : '#fff';
    } else { comboEl.textContent = ''; }
    const total = this.totalJudged || 1;
    document.getElementById('accuracy-display').textContent = Math.round((this.totalHits / total) * 10000) / 100 + '%';
    document.getElementById('health-bar').style.width = (this.health * 100) + '%';
  }

  _endGame() {
    this.running = false;
    if (this.musicSource) { try { this.musicSource.stop(); } catch(e) {} }
    document.getElementById('game-screen').style.display = 'none';
    const total = this.totalJudged || 1;
    const acc = this.totalHits / total;
    let grade;
    if (acc >= 0.98 && this.misses === 0) grade = 'SS';
    else if (acc >= 0.95) grade = 'S';
    else if (acc >= 0.85) grade = 'A';
    else if (acc >= 0.70) grade = 'B';
    else if (acc >= 0.50) grade = 'C';
    else grade = 'D';
    document.getElementById('result-grade').textContent = grade;
    document.getElementById('result-track').textContent = (this.track.name || 'Custom') + (this.isCustom ? '' : ' [' + this.track.diffLabel + ']');
    document.getElementById('result-score').textContent = this.score.toLocaleString() + ' pts';
    document.getElementById('result-stats').innerHTML =
      '<span class="c-perfect">Perfect</span><span class="c-perfect">' + this.perfects + '</span>' +
      '<span class="c-great">Great</span><span class="c-great">' + this.greats + '</span>' +
      '<span class="c-good">Good</span><span class="c-good">' + this.goods + '</span>' +
      '<span class="c-miss">Miss</span><span class="c-miss">' + this.misses + '</span>' +
      '<span>Max Combo</span><span>' + this.maxCombo + '</span>' +
      '<span>Accuracy</span><span>' + (Math.round(acc * 10000) / 100) + '%</span>';
    document.getElementById('result-screen').style.display = 'flex';
  }
}

// ===================== APP =====================
const audio = new AudioEngine();
const game = new Game(audio);
let selectedTrackIdx = 1;
let customFile = null;
let customBeatmap = null;
let customAudioBuffer = null;

const sensitivityLabels = ['很低', '低', '中', '高', '很高'];

function renderTrackList() {
  const list = document.getElementById('track-list');
  list.innerHTML = TRACKS.map((t, i) =>
    '<div class="track-card' + (i === selectedTrackIdx && !customBeatmap ? ' selected' : '') + '" data-idx="' + i + '">' +
    '<div><div class="track-name">' + t.name + '</div><div class="track-meta">BPM ' + t.bpm + ' · ' + Math.floor(t.duration) + 's</div></div>' +
    '<div class="track-diff ' + t.diffClass + '">' + t.diffLabel + '</div></div>'
  ).join('');
  list.querySelectorAll('.track-card').forEach(card => {
    card.addEventListener('click', () => {
      selectedTrackIdx = parseInt(card.dataset.idx);
      clearCustom();
      renderTrackList();
    });
  });
}

function clearCustom() {
  customFile = null; customBeatmap = null; customAudioBuffer = null;
  updateUploadUI();
}

function updateUploadUI() {
  const area = document.getElementById('upload-area');
  const icon = document.getElementById('upload-icon');
  const text = document.getElementById('upload-text');
  const nameEl = document.getElementById('upload-file-name');
  const infoEl = document.getElementById('upload-file-info');
  const statusEl = document.getElementById('upload-status');
  const sensRow = document.getElementById('sensitivity-row');

  if (customFile) {
    area.classList.add('has-file');
    icon.textContent = '✅';
    text.style.display = 'none';
    nameEl.style.display = 'block';
    nameEl.textContent = customFile.name;
    infoEl.style.display = 'block';
    sensRow.style.display = 'flex';
    if (customBeatmap) {
      infoEl.textContent = '检测到 ' + customBeatmap.notes.length + ' 个音符 · ' + Math.floor(customBeatmap.duration) + 's' + (customBeatmap.bpm ? ' · ≈' + customBeatmap.bpm + ' BPM' : '');
      statusEl.style.display = 'block';
      statusEl.textContent = '就绪 ✓';
      document.getElementById('start-btn').disabled = false;
    } else {
      infoEl.textContent = customAudioBuffer ? '时长 ' + Math.floor(customAudioBuffer.duration) + 's' : '';
    }
  } else {
    area.classList.remove('has-file');
    icon.textContent = '🎵';
    text.style.display = 'block';
    nameEl.style.display = 'none'; infoEl.style.display = 'none';
    statusEl.style.display = 'none'; sensRow.style.display = 'none';
    document.getElementById('start-btn').disabled = false;
  }
}

async function processAudioFile(file) {
  customFile = file;
  customBeatmap = null;
  customAudioBuffer = null;
  updateUploadUI();
  const statusEl = document.getElementById('upload-status');
  statusEl.style.display = 'block';
  statusEl.textContent = '分析中...';
  try {
    await audio.init();
    const ab = await file.arrayBuffer();
    customAudioBuffer = await audio.ctx.decodeAudioData(ab);
    updateUploadUI();
    const sens = parseFloat(document.getElementById('sensitivity-slider').value);
    const result = detectBeats(customAudioBuffer, sens);
    customBeatmap = onsetsToBeatmap(result.onsets, result.duration);
    customBeatmap.bpm = result.bpm;
    updateUploadUI();
    renderTrackList();
  } catch(e) {
    statusEl.textContent = '解析失败: ' + e.message;
    console.error(e);
  }
}

// Upload events
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');
uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) processAudioFile(fileInput.files[0]); });
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) processAudioFile(e.dataTransfer.files[0]);
});

document.getElementById('sensitivity-slider').addEventListener('input', function() {
  document.getElementById('sensitivity-val').textContent = sensitivityLabels[Math.round(parseFloat(this.value)) - 1] || this.value;
});
document.getElementById('sensitivity-slider').addEventListener('change', function() {
  if (customFile) processAudioFile(customFile);
});

// Buttons
document.getElementById('start-btn').addEventListener('click', async () => {
  await audio.init();
  if (customBeatmap && customAudioBuffer) {
    const ct = { id: 'custom', name: customFile.name.replace(/\.[^.]+$/, ''), bpm: customBeatmap.bpm || 120,
      difficulty: 'custom', diffLabel: 'CUSTOM', diffClass: 'diff-custom', duration: customBeatmap.duration };
    game.start(ct, { custom: true, buffer: customAudioBuffer, beatmap: customBeatmap });
  } else {
    game.start(TRACKS[selectedTrackIdx]);
  }
});

document.getElementById('retry-btn').addEventListener('click', () => {
  if (customBeatmap && customAudioBuffer) {
    const ct = { id: 'custom', name: customFile.name.replace(/\.[^.]+$/, ''), bpm: customBeatmap.bpm || 120,
      difficulty: 'custom', diffLabel: 'CUSTOM', diffClass: 'diff-custom', duration: customBeatmap.duration };
    game.start(ct, { custom: true, buffer: customAudioBuffer, beatmap: customBeatmap });
  } else {
    game.start(TRACKS[selectedTrackIdx]);
  }
});
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  renderTrackList();
});

// Init
renderTrackList();
updateUploadUI();
console.log('🎵 BeatDrop ready!');
console.log('  内置曲目: 选歌 → START');
console.log('  自定义:   拖入 MP3/WAV → 自动生成谱面 → START');
console.log('⌨️  D F J K (手机点击轨道)');
console.log('⏸️  ESC 暂停');
